<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - ContentEngine SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body class="bg-slate-50 flex items-center justify-center h-screen">
    <div
      id="auth-app"
      class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-slate-100 p-8"
    >
      <div class="text-center mb-8">
        <i
          class="fa-solid fa-bolt text-brand-500 text-4xl mb-3 text-blue-600"
        ></i>
        <h1 class="text-2xl font-bold text-slate-800">Welcome Back</h1>
        <p class="text-sm text-slate-500 mt-1">
          Sign in to your ContentEngine account
        </p>
      </div>

      <form @submit.prevent="handleLogin" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1"
            >Username</label
          >
          <input
            type="text"
            v-model="username"
            required
            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 transition-all"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1"
            >Password</label
          >
          <input
            type="password"
            v-model="password"
            required
            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 transition-all"
          />
        </div>

        <div
          v-if="error"
          class="p-3 bg-red-50 text-red-600 text-sm rounded-lg border border-red-100"
        >
          <i class="fa-solid fa-circle-exclamation mr-2"></i>{{ error }}
        </div>

        <button
          type="submit"
          :disabled="isLoading"
          class="w-full py-3 bg-slate-900 hover:bg-slate-800 text-white font-medium rounded-lg transition-colors flex items-center justify-center disabled:opacity-50"
        >
          <i v-if="isLoading" class="fa-solid fa-spinner fa-spin mr-2"></i>
          {{ isLoading ? 'Signing in...' : 'Sign In' }}
        </button>
      </form>

      <p class="text-center text-sm text-slate-500 mt-6">
        Don't have an account?
        <a href="/register" class="text-blue-600 font-medium hover:underline"
          >Create one</a
        >
      </p>
    </div>

    <script src="/js/auth.js"></script>
    <script>
      const { createApp } = Vue;
      createApp({
        data() {
          return { username: "", password: "", error: null, isLoading: false };
        },
        methods: {
          async handleLogin() {
            this.isLoading = true;
            this.error = null;
            const formData = new URLSearchParams();
            formData.append("username", this.username);
            formData.append("password", this.password);

            try {
              const res = await fetch("/api/auth/login", {
                method: "POST",
                headers: {
                  "Content-Type": "application/x-www-form-urlencoded",
                },
                body: formData,
              });
              const data = await res.json();
              if (!res.ok) throw new Error(data.detail || "Login failed");

              AuthService.setToken(data.access_token);
              window.location.href = "/"; // Ana sayfaya yönlendir
            } catch (err) {
              this.error = err.message;
            } finally {
              this.isLoading = false;
            }
          },
        },
      }).mount("#auth-app");
    </script>
  </body>
</html>
