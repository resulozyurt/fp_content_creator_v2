<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - ContentEngine SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body class="bg-slate-50 flex items-center justify-center h-screen">
    <div
      id="auth-app"
      class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-slate-100 p-8"
    >
      <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-slate-800">Create Account</h1>
        <p class="text-sm text-slate-500 mt-1">Join ContentEngine today</p>
      </div>

      <form @submit.prevent="handleRegister" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1"
            >Email</label
          >
          <input
            type="email"
            v-model="form.email"
            required
            class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1"
            >Username</label
          >
          <input
            type="text"
            v-model="form.username"
            required
            class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1"
            >Password</label
          >
          <input
            type="password"
            v-model="form.password"
            required
            class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <div
          v-if="error"
          class="p-3 bg-red-50 text-red-600 text-sm rounded-lg border border-red-100"
        >
          <i class="fa-solid fa-circle-exclamation mr-2"></i>{{ error }}
        </div>
        <div
          v-if="success"
          class="p-3 bg-green-50 text-green-700 text-sm rounded-lg border border-green-100"
        >
          <i class="fa-solid fa-check mr-2"></i>Account created! Redirecting to
          login...
        </div>

        <button
          type="submit"
          :disabled="isLoading || success"
          class="w-full py-3 mt-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition-colors flex items-center justify-center disabled:opacity-50"
        >
          <i v-if="isLoading" class="fa-solid fa-spinner fa-spin mr-2"></i>
          {{ isLoading ? 'Creating...' : 'Register' }}
        </button>
      </form>

      <p class="text-center text-sm text-slate-500 mt-6">
        Already have an account?
        <a href="/login" class="text-blue-600 font-medium hover:underline"
          >Sign in</a
        >
      </p>
    </div>

    <script src="/js/auth.js"></script>
    <script>
      const { createApp } = Vue;
      createApp({
        data() {
          return {
            form: { email: "", username: "", password: "" },
            error: null,
            success: false,
            isLoading: false,
          };
        },
        methods: {
          async handleRegister() {
            this.isLoading = true;
            this.error = null;
            try {
              const res = await fetch("/api/auth/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(this.form),
              });
              const data = await res.json();
              if (!res.ok)
                throw new Error(data.detail || "Registration failed");

              this.success = true;
              setTimeout(() => (window.location.href = "/login"), 2000);
            } catch (err) {
              this.error = err.message;
            } finally {
              this.isLoading = false;
            }
          },
        },
      }).mount("#auth-app");
    </script>
  </body>
</html>
