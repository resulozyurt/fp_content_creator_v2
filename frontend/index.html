<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SEO İçerik Motoru | Yönetim Paneli</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: "#eff6ff",
                100: "#dbeafe",
                500: "#3b82f6",
                600: "#2563eb",
                900: "#1e3a8a",
              },
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-gray-50 text-gray-800 font-sans">
    <div id="app" class="flex h-screen overflow-hidden">
      <aside class="w-64 bg-slate-900 text-white flex flex-col hidden md:flex">
        <div class="h-16 flex items-center px-6 border-b border-slate-700">
          <i class="fa-solid fa-bolt text-brand-500 text-xl mr-3"></i>
          <span class="text-lg font-bold tracking-wider">ContentEngine</span>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2">
          <a
            href="/"
            class="flex items-center px-4 py-3 bg-brand-600 text-white rounded-lg transition-colors"
          >
            <i class="fa-solid fa-pen-nib w-5 mr-3"></i
            ><span class="font-medium">İçerik Üretici</span>
          </a>
          <a
            href="#"
            class="flex items-center px-4 py-3 text-slate-300 hover:bg-slate-800 hover:text-white rounded-lg transition-colors"
          >
            <i class="fa-solid fa-clock-rotate-left w-5 mr-3"></i
            ><span class="font-medium">Geçmiş (Yakında)</span>
          </a>
          <a
            href="/wp-settings"
            class="flex items-center px-4 py-3 text-slate-300 hover:bg-slate-800 hover:text-white rounded-lg transition-colors"
          >
            <i class="fa-brands fa-wordpress w-5 mr-3"></i
            ><span class="font-medium">WP Entegrasyonu</span>
          </a>
        </nav>
      </aside>

      <main class="flex-1 flex flex-col h-screen overflow-y-auto relative">
        <header
          class="h-16 bg-white border-b border-gray-200 flex items-center px-8 shadow-sm justify-between"
        >
          <h1 class="text-xl font-semibold text-gray-800">
            Yeni İçerik Oluştur
          </h1>
        </header>

        <div class="p-8 max-w-7xl mx-auto w-full flex-1">
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-6">
              <div
                class="bg-white p-6 rounded-xl shadow-sm border border-gray-100"
              >
                <h2 class="text-lg font-bold mb-4 border-b pb-2">
                  Üretim Parametreleri
                </h2>
                <form @submit.prevent="generateArticle" class="space-y-4">
                  <div>
                    <label class="block text-sm font-medium mb-1"
                      >Anahtar Kelime</label
                    >
                    <input
                      type="text"
                      v-model="form.keyword"
                      required
                      class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-brand-500 outline-none"
                      :disabled="isLoading"
                    />
                  </div>
                  <div class="grid grid-cols-2 gap-4">
                    <div>
                      <label class="block text-sm font-medium mb-1">Dil</label>
                      <select
                        v-model="form.language"
                        class="w-full px-4 py-2 border rounded-lg outline-none"
                        :disabled="isLoading"
                      >
                        <option value="tr">Türkçe</option>
                        <option value="en">English</option>
                      </select>
                    </div>
                    <div>
                      <label class="block text-sm font-medium mb-1">Ülke</label>
                      <select
                        v-model="form.country"
                        class="w-full px-4 py-2 border rounded-lg outline-none"
                        :disabled="isLoading"
                      >
                        <option value="tr">TR</option>
                        <option value="us">US</option>
                      </select>
                    </div>
                  </div>
                  <button
                    type="submit"
                    :disabled="isLoading || !form.keyword"
                    class="w-full mt-6 bg-brand-600 hover:bg-brand-700 text-white py-3 rounded-lg flex items-center justify-center disabled:opacity-50"
                  >
                    <span v-if="!isLoading"
                      ><i class="fa-solid fa-wand-magic-sparkles mr-2"></i>
                      İçeriği Üret</span
                    >
                    <span v-else
                      ><i class="fa-solid fa-circle-notch fa-spin mr-2"></i>
                      Çalışıyor...</span
                    >
                  </button>
                </form>
              </div>
            </div>

            <div class="lg:col-span-2">
              <div
                class="bg-white rounded-xl shadow-sm border border-gray-100 min-h-[600px] flex flex-col"
              >
                <div
                  class="border-b border-gray-100 p-4 flex justify-between items-center bg-gray-50 rounded-t-xl"
                >
                  <h3 class="font-semibold text-gray-700">
                    <i class="fa-regular fa-file-lines mr-2"></i> Çıktı Önizleme
                  </h3>
                  <div v-if="articleMarkdown" class="space-x-2 flex">
                    <button
                      @click="copyToClipboard"
                      class="px-3 py-1.5 text-sm bg-white border rounded hover:bg-gray-100"
                    >
                      <i class="fa-regular fa-copy"></i> Kopyala
                    </button>
                    <button
                      @click="publishToWp"
                      :disabled="isPublishing"
                      class="px-3 py-1.5 text-sm bg-brand-600 hover:bg-brand-700 text-white rounded disabled:opacity-50"
                    >
                      <span v-if="!isPublishing"
                        ><i class="fa-brands fa-wordpress"></i> WP'ye
                        Gönder</span
                      >
                      <span v-else
                        ><i class="fa-solid fa-circle-notch fa-spin"></i>
                        Gönderiliyor...</span
                      >
                    </button>
                  </div>
                </div>
                <div class="p-8 flex-1 overflow-y-auto">
                  <div
                    v-if="articleMarkdown && !isLoading"
                    class="prose max-w-none"
                    v-html="renderedHtml"
                  ></div>
                  <div
                    v-else-if="isLoading"
                    class="flex justify-center text-brand-500 mt-20"
                  >
                    <i class="fa-solid fa-layer-group fa-bounce text-4xl"></i>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script src="/js/app.js"></script>
  </body>
</html>
