<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WP Settings - ContentEngine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: "#eff6ff",
                100: "#dbeafe",
                500: "#3b82f6",
                600: "#2563eb",
                900: "#1e3a8a",
              },
            },
          },
        },
        // SİNSİ BUG'IN ÇÖZÜMÜ: Tailwind'e bu sınıfları her zaman hazırda tutmasını emrediyoruz
        safelist: [
          "bg-brand-600",
          "shadow-brand-500/30",
          "text-brand-500",
          "bg-purple-600",
          "text-purple-400",
        ],
      };
    </script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body class="bg-slate-50 text-slate-800 font-sans h-screen overflow-hidden">
    <div id="wp-app" class="flex h-full w-full" v-cloak>
      <app-sidebar></app-sidebar>

      <main class="flex-1 flex flex-col h-full overflow-hidden relative">
        <header
          class="h-16 bg-white border-b border-slate-200 flex items-center px-8 shrink-0"
        >
          <h1 class="text-xl font-semibold text-slate-800">
            WordPress Integration
          </h1>
        </header>

        <div class="flex-1 overflow-auto p-8 flex justify-center">
          <div
            class="w-full max-w-2xl bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden h-fit"
          >
            <div class="p-6 border-b border-slate-200 bg-slate-50">
              <h2 class="text-lg font-bold text-slate-800 flex items-center">
                <i
                  class="fa-brands fa-wordpress text-brand-600 mr-2 text-2xl"
                ></i>
                Connect Your Website
              </h2>
              <p class="text-sm text-slate-500 mt-1">
                This information is securely stored in the database and is used
                solely for your content transfers.
              </p>
            </div>

            <form @submit.prevent="saveSettings" class="p-8 space-y-6">
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1"
                  >Website Name (Optional)</label
                >
                <input
                  type="text"
                  v-model="form.website_name"
                  placeholder="E.g., My Tech Blog"
                  class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-brand-500 transition-all"
                />
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1"
                  >WordPress Site URL</label
                >
                <input
                  type="url"
                  v-model="form.wp_url"
                  required
                  placeholder="https://www.yoursite.com"
                  class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-brand-500 transition-all"
                />
              </div>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                  <label class="block text-sm font-medium text-slate-700 mb-1"
                    >Admin Username</label
                  >
                  <input
                    type="text"
                    v-model="form.wp_username"
                    required
                    class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-brand-500 transition-all"
                  />
                </div>
                <div>
                  <label class="block text-sm font-medium text-slate-700 mb-1"
                    >Application Password</label
                  >
                  <input
                    type="password"
                    v-model="form.wp_app_password"
                    required
                    placeholder="xxxx xxxx xxxx xxxx"
                    class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-brand-500 transition-all"
                  />
                  <p class="text-xs text-slate-400 mt-1">
                    WP Admin > Users > Profile
                  </p>
                </div>
              </div>

              <div
                v-if="message"
                :class="['p-4 rounded-lg text-sm border flex items-center', isError ? 'bg-red-50 border-red-200 text-red-700' : 'bg-green-50 border-green-200 text-green-700']"
              >
                <i
                  :class="['fa-solid mr-2', isError ? 'fa-triangle-exclamation' : 'fa-check-circle']"
                ></i>
                {{ message }}
              </div>

              <button
                type="submit"
                :disabled="isLoading"
                class="w-full py-3 bg-brand-600 hover:bg-brand-700 text-white font-medium rounded-lg transition-colors flex items-center justify-center disabled:opacity-50"
              >
                <i
                  v-if="isLoading"
                  class="fa-solid fa-spinner fa-spin mr-2"
                ></i>
                <i v-else class="fa-solid fa-save mr-2"></i>
                {{ isLoading ? 'Saving...' : 'Save Configuration' }}
              </button>
            </form>
          </div>
        </div>
      </main>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/sidebar.js"></script>
    <script>
      const { createApp } = Vue;
      const app = createApp({
        data() {
          return {
            form: {
              website_name: "",
              wp_url: "",
              wp_username: "",
              wp_app_password: "",
            },
            isLoading: false,
            message: null,
            isError: false,
          };
        },
        async mounted() {
          if (!AuthService.isAuthenticated()) {
            window.location.href = "/login";
            return;
          }
          await this.loadSettings();
        },
        methods: {
          async loadSettings() {
            try {
              const res = await fetch("/api/wp-settings/", {
                headers: { ...AuthService.getAuthHeaders() },
              });
              if (res.status === 404) return;
              if (!res.ok) throw new Error("Ayarlar yüklenemedi.");
              const data = await res.json();
              this.form.website_name = data.website_name || "";
              this.form.wp_url = data.wp_url || "";
              this.form.wp_username = data.wp_username || "";
            } catch (err) {
              console.error(err);
            }
          },
          async saveSettings() {
            this.isLoading = true;
            this.message = null;
            this.isError = false;
            try {
              const res = await fetch("/api/wp-settings/", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  ...AuthService.getAuthHeaders(),
                },
                body: JSON.stringify(this.form),
              });
              const data = await res.json();
              if (!res.ok)
                throw new Error(data.detail || "Ayarlar kaydedilemedi.");
              this.message =
                "WordPress ayarlarınız başarıyla veritabanına kaydedildi!";
              setTimeout(() => {
                this.message = null;
              }, 3000);
            } catch (err) {
              this.isError = true;
              this.message = err.message;
            } finally {
              this.isLoading = false;
            }
          },
        },
      });

      app.component("app-sidebar", AppSidebar);
      app.mount("#wp-app");
    </script>
  </body>
</html>
