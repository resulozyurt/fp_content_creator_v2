<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Geçmiş Kayıtlar | SEO İçerik Motoru</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: "#eff6ff",
                100: "#dbeafe",
                500: "#3b82f6",
                600: "#2563eb",
                900: "#1e3a8a",
              },
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-gray-50 text-gray-800 font-sans">
    <div id="app" class="flex h-screen overflow-hidden">
      <app-sidebar></app-sidebar>

      <main class="flex-1 flex flex-col h-screen overflow-y-auto relative">
        <header
          class="h-16 bg-white border-b border-gray-200 flex items-center px-8 shadow-sm justify-between"
        >
          <h1 class="text-xl font-semibold text-gray-800">
            Veritabanı / Geçmiş Üretimler
          </h1>
        </header>

        <div class="p-8 max-w-7xl mx-auto w-full flex-1">
          <div
            v-if="isLoading"
            class="flex justify-center mt-20 text-brand-500"
          >
            <i class="fa-solid fa-circle-notch fa-spin text-4xl"></i>
          </div>

          <div
            v-else
            class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden"
          >
            <table class="min-w-full divide-y divide-gray-200">
              <thead class="bg-gray-50">
                <tr>
                  <th
                    scope="col"
                    class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"
                  >
                    Tarih
                  </th>
                  <th
                    scope="col"
                    class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"
                  >
                    Anahtar Kelime
                  </th>
                  <th
                    scope="col"
                    class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"
                  >
                    Dil
                  </th>
                  <th
                    scope="col"
                    class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider"
                  >
                    İşlemler
                  </th>
                </tr>
              </thead>
              <tbody class="bg-white divide-y divide-gray-200">
                <tr
                  v-for="item in history"
                  :key="item.id"
                  class="hover:bg-gray-50 transition-colors"
                >
                  <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                    {{ formatDate(item.created_at) }}
                  </td>
                  <td
                    class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900"
                  >
                    {{ item.keyword }}
                  </td>
                  <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                    <span class="px-2 py-1 bg-gray-100 rounded text-xs"
                      >{{ item.language.toUpperCase() }}</span
                    >
                  </td>
                  <td
                    class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium space-x-2"
                  >
                    <button
                      @click="viewArticle(item)"
                      class="text-blue-600 hover:text-blue-900 bg-blue-50 px-3 py-1 rounded"
                    >
                      Görüntüle
                    </button>
                  </td>
                </tr>
                <tr v-if="history.length === 0">
                  <td colspan="4" class="px-6 py-10 text-center text-gray-400">
                    Henüz veritabanında kayıt bulunmuyor.
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <div
          v-if="selectedArticle"
          class="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4"
        >
          <div
            class="bg-white rounded-xl shadow-2xl w-full max-w-5xl max-h-[90vh] flex flex-col"
          >
            <div
              class="p-4 border-b flex justify-between items-center bg-gray-50 rounded-t-xl"
            >
              <h3 class="font-bold text-lg">
                <i class="fa-regular fa-file-lines mr-2"></i> {{
                selectedArticle.keyword }}
              </h3>
              <div class="space-x-2 flex">
                <button
                  @click="publishToWp(selectedArticle)"
                  :disabled="isPublishing"
                  class="px-3 py-1.5 text-sm bg-brand-600 hover:bg-brand-700 text-white rounded"
                >
                  <span v-if="!isPublishing"
                    ><i class="fa-brands fa-wordpress"></i> WP'ye Gönder</span
                  >
                  <span v-else
                    ><i class="fa-solid fa-circle-notch fa-spin"></i
                  ></span>
                </button>
                <button
                  @click="selectedArticle = null"
                  class="px-3 py-1.5 text-gray-500 hover:bg-gray-200 rounded"
                >
                  <i class="fa-solid fa-xmark"></i> Kapat
                </button>
              </div>
            </div>
            <div
              class="p-8 overflow-y-auto prose max-w-none flex-1"
              v-html="renderedModalHtml"
            ></div>
          </div>
        </div>
      </main>
    </div>

    <script src="/js/history.js"></script>
  </body>
</html>
